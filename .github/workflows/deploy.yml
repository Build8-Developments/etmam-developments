name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - strapi

env:
  NODE_VERSION: "20.x"
  DEPLOY_PATH: "/var/www/etmam"

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'push' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'frontend'

    steps:
      - name: Deploy Frontend to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "🚀 Starting frontend deployment..."

            cd ${{ env.DEPLOY_PATH }}

            # Pull latest changes
            echo "📥 Pulling latest changes..."
            git pull origin main

            # Install dependencies and build
            echo "📦 Installing dependencies..."
            cd frontend
            npm ci

            echo "🔨 Building Next.js..."
            npm run build

            # Restart PM2 process
            echo "🔄 Restarting frontend..."
            pm2 restart etmam-frontend

            echo "✅ Frontend deployment complete!"

  deploy-strapi:
    name: Deploy Strapi
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-frontend
    if: |
      always() && 
      (github.event_name == 'push' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'strapi') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped')

    steps:
      - name: Deploy Strapi to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "🚀 Starting Strapi deployment..."

            cd ${{ env.DEPLOY_PATH }}

            # Pull latest changes (skip if frontend already pulled)
            echo "📥 Pulling latest changes..."
            git pull origin main

            cd strapi

            # Preserve database and uploads by excluding them from any clean operations
            echo "💾 Database and uploads will be preserved..."

            # Install dependencies
            echo "📦 Installing dependencies..."
            npm ci

            # Rebuild native modules (better-sqlite3)
            echo "🔨 Rebuilding native modules..."
            npm rebuild better-sqlite3

            # Build Strapi
            echo "🔨 Building Strapi..."
            npm run build

            # Restart PM2 process
            echo "🔄 Restarting Strapi..."
            pm2 restart strapi

            echo "✅ Strapi deployment complete!"

  notify:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-strapi]
    if: always()

    steps:
      - name: Check deployment status
        run: |
          echo "🎯 Deployment Summary:"
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          echo "Strapi: ${{ needs.deploy-strapi.result }}"

          if [ "${{ needs.deploy-frontend.result }}" == "success" ] || [ "${{ needs.deploy-frontend.result }}" == "skipped" ]; then
            if [ "${{ needs.deploy-strapi.result }}" == "success" ] || [ "${{ needs.deploy-strapi.result }}" == "skipped" ]; then
              echo "✅ Deployment successful!"
              exit 0
            fi
          fi

          echo "❌ Deployment failed!"
          exit 1
